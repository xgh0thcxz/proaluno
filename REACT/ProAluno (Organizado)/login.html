<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Proaluno</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="CSS/login.css"> 
</head>
<body>
  <main class="login-section">
    <div class="main-container">
      <section class="info-panel" aria-labelledby="brand-heading">
        <h1 id="brand-heading" class="sr-only">Proaluno - Educação que ouve, educação que avança</h1>
        <div class="logo-container">
          <img src="https://i.postimg.cc/8PZ4hyLY/image.png" alt="Logo Proaluno" class="logo-img-main">
        </div>
        <div class="slogan-container">
          <div class="slogan-text">
            <div class="slogan-main">Educação que ouve, educação que avança</div>
          </div>
        </div>
      </section>
      
      <section class="login-panel" aria-labelledby="login-heading">
        <div class="login-content">
          <h2 id="login-heading" class="login-title">Faça seu login aqui</h2>
          <p class="login-subtitle">Deseja entrar como:</p>
          <div class="login-options">
            <a href="aluno_login.html" class="option-card" aria-label="Entrar como Aluno">
              <img src="https://cdn-icons-png.flaticon.com/512/3413/3413366.png" alt="Ícone de aluno" class="option-icon student-icon">
              <span class="option-label">Aluno</span>
              <span class="option-description">Acesse a página inicial do aluno</span>
            </a>
            <a href="colab_login.html" class="option-card" aria-label="Entrar como Colaborador">
              <img src="https://png.pngtree.com/png-vector/20230407/ourmid/pngtree-professor-line-icon-vector-png-image_6689020.png" alt="Ícone de colaborador" class="option-icon">
              <span class="option-label">Colaborador</span>
              <span class="option-description">Acesse a página do colaborador</span>
            </a>
          </div>
        </div>
      </section>
    </div>
    
    <!-- Elementos decorativos flutuantes -->
    <div class="floating-elements" aria-hidden="true">
      <div class="floating-element"></div>
      <div class="floating-element"></div>
      <div class="floating-element"></div>
      <div class="floating-element"></div>
    </div>
    
    <!-- Sistema de partículas -->
    <div id="particles-js" aria-hidden="true"></div>
    
    <!-- Botão de ajuda -->
    <div class="help-button pulse-glow" aria-label="Ajuda" role="button" tabindex="0">
      ?
    </div>
  </main>
      <script src="JS/login.js"></script>

</body>
</html>
