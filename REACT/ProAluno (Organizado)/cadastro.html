<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Ouvidoria Proaluno</title>
    <meta name="description" content="Faça seu cadastro na Ouvidoria Proaluno - Educação que ouve, educação que avança">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="CSS/cadastro.css"> 
</head>
<body>
    <section id="registration-section" class="registration-section">
        <div class="background-decor">
            <img src="${ASSET_PATH}/277_29.svg" alt="" class="shape shape-1">
            <img src="${ASSET_PATH}/277_30.svg" alt="" class="shape shape-2">
            <img src="${ASSET_PATH}/277_31.svg" alt="" class="shape shape-3">
            <img src="${ASSET_PATH}/277_49.svg" alt="" class="shape shape-4">
        </div>

        <a href="login.html" class="back-button">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M19 12H5m0 0l6-6m-6 6l6 6"/>
            </svg>
            Voltar
        </a>

        <div class="form-container">
            <div class="form-header">
                <div class="welcome-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                </div>
                <h1 class="form-title">Olá aluno(a)!</h1>
                <p class="form-subtitle">Faça o cadastro aqui</p>
            </div>

            <form class="registration-form" id="registrationForm">
                <div class="form-group">
                    <label for="username">
                        Nome de usuário
                        <span class="required">*</span>
                    </label>
                    <div class="input-wrapper">
                        <input type="text" id="username" placeholder="Insira aqui seu Nome de Usuário" required>
                        <div class="input-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                            </svg>
                        </div>
                    </div>
                    <div class="error-message">Por favor, insira um nome de usuário válido</div>
                </div>

                <div class="form-group">
                    <label for="fullname">
                        Nome Completo
                        <span class="required">*</span>
                    </label>
                    <div class="input-wrapper">
                        <input type="text" id="fullname" placeholder="Insira aqui seu Nome Completo" required>
                        <div class="input-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M3 5v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2H5c-1.11 0-2 .9-2 2zm12 4c0 1.66-1.34 3-3 3s-3-1.34-3-3 1.34-3 3-3 3 1.34 3 3zm-9 8c0-2 4-3.1 6-3.1s6 1.1 6 3.1v1H6v-1z"/>
                            </svg>
                        </div>
                    </div>
                    <div class="error-message">Por favor, insira seu nome completo</div>
                </div>

                <div class="form-group">
                    <label for="email">
                        E-mail
                        <span class="required">*</span>
                    </label>
                    <div class="input-wrapper">
                        <input type="email" id="email" placeholder="Insira aqui seu E-mail" required>
                        <div class="input-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                            </svg>
                        </div>
                    </div>
                    <div class="error-message">Por favor, insira um e-mail válido</div>
                </div>

                <div class="form-group">
                    <label for="password">
                        Senha
                        <span class="required">*</span>
                    </label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="Insira aqui sua Senha (mínimo de 5 caracteres)" required minlength="5">
                        <div class="input-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM12 17c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zM15.1 8H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                            </svg>
                        </div>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div class="strength-fill" id="password-strength"></div>
                        </div>
                    </div>
                    <div class="error-message">A senha deve ter pelo menos 5 caracteres</div>
                </div>

                <div class="form-group">
                    <label for="school">Unidade Escolar</label>
                    <div class="custom-select" tabindex="0" role="combobox">
                        <span>ITB Brasilio Flores de Azevedo</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="phone">Número de Telefone</label>
                    <div class="input-wrapper">
                        <input type="tel" id="phone" placeholder="Insira aqui seu Número de Telefone">
                        <div class="input-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="terms-group">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">
                        Concordo com os <a href="#" target="_blank">Termos de Uso</a> e <a href="#" target="_blank">Política de Privacidade</a>
                        <span class="required">*</span>
                    </label>
                </div>

                <button type="submit" class="submit-button" id="submitButton">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                    </svg>
                    Finalizar Cadastro
                </button>

                <div class="login-link">
                    Já tem uma conta? <a href="login 5.html">Faça login aqui</a>
                </div>
            </form>
        </div>
    </section>
    <script src="JS/cadastro.js"></script>
</body>
</html>
