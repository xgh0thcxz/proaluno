<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Proaluno</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="CSS/aluno_login.css">
</head>
<body>
  <!-- Efeito de Partículas -->
  <div class="particles" id="particles"></div>

  <main class="login-page">
    <!-- Elementos Flutuantes Decorativos -->
    <div class="floating-elements">
      <div class="floating-element" style="width: 80px; height: 80px; top: 10%; left: 10%;"></div>
      <div class="floating-element" style="width: 120px; height: 120px; top: 60%; right: 10%;"></div>
      <div class="floating-element" style="width: 60px; height: 60px; bottom: 20%; left: 20%;"></div>
    </div>

    <!-- Painel da Marca -->
    <section class="brand-panel">
      <div class="brand-content">
        <div class="logo-container">
          <img src="https://i.postimg.cc/8PZ4hyLY/image.png" alt="Proaluno Logo" class="logo">
        </div>
        <p class="tagline">Educação que ouve, educação que avança</p>
      </div>
    </section>

    <!-- Painel do Formulário -->
    <section class="form-panel">
      <div class="login-form-container">
        <form class="login-form" id="loginForm" novalidate>
          <div class="form-header">
            <h1 class="form-title">Bem-vindo de volta</h1>
            <p class="form-subtitle">ALUNO</p>
          </div>
          
          <p class="signup-prompt">
            Novo por aqui? <a href="cadastro.html">Crie sua conta</a>
          </p>
          
          <div class="form-group">
            <label for="email">
              <i class="fas fa-envelope"></i> E-mail
            </label>
            <div class="input-wrapper">
              <i class="fas fa-envelope input-icon"></i>
              <input 
                type="email" 
                id="email" 
                placeholder="seu@email.com"
                required
              >
            </div>
            <div class="validation-message" id="email-validation"></div>
          </div>
          
          <div class="form-group">
            <label for="password">
              <i class="fas fa-lock"></i> Senha
            </label>
            <div class="input-wrapper">
              <i class="fas fa-lock input-icon"></i>
              <input 
                type="password" 
                id="password" 
                placeholder="Sua senha"
                required
                minlength="6"
              >
            </div>
            <div class="validation-message" id="password-validation"></div>
          </div>

          <!-- Link "Esqueceu a senha" -->
          <div class="forgot-password">
            <a href="#" id="forgotPasswordLink">
              <i class="fas fa-key"></i> Esqueceu sua senha?
            </a>
          </div>
          
          <button type="submit" class="submit-btn">
            Entrar <i class="fas fa-arrow-right"></i>
          </button>
        </form>
      </div>
    </section>
  </main>

  <!-- Modal de Recuperação de Senha -->
  <div class="modal" id="forgotPasswordModal">
    <div class="modal-content">
      <button class="modal-close" id="modalClose">
        <i class="fas fa-times"></i>
      </button>
      
      <div class="modal-header">
        <h2 class="modal-title">Recuperar Senha</h2>
        <p class="modal-subtitle">Digite seu e-mail para receber o link de recuperação</p>
      </div>

      <form id="recoveryForm">
        <div class="form-group">
          <label for="recoveryEmail">
            <i class="fas fa-envelope"></i> E-mail
          </label>
          <div class="input-wrapper">
            <i class="fas fa-envelope input-icon"></i>
            <input 
              type="email" 
              id="recoveryEmail" 
              placeholder="seu@email.com"
              required
            >
          </div>
          <div class="validation-message" id="recovery-email-validation"></div>
        </div>

        <button type="submit" class="submit-btn">
          <i class="fas fa-paper-plane"></i> Enviar Link
        </button>
      </form>

      <div class="modal-success" id="successMessage">
        <i class="fas fa-check-circle"></i>
        <h3 class="modal-title">E-mail enviado!</h3>
        <p class="modal-subtitle">Verifique sua caixa de entrada para redefinir sua senha</p>
      </div>
    </div>
  </div>
  <script src="JS/aluno_login.js"></script>
</body>
</html>
